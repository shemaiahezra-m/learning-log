name: Smart Daily Dev Log

on:
  schedule:
    - cron: "6 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Generate smart daily log
        run: |
          DATE=$(TZ="Asia/Manila" date +"%Y-%m-%d")

          RANDOM_NOTES=(
            "Reviewed frontend fundamentals"
            "Practiced Git and GitHub workflow"
            "Improved UI/UX layout decisions"
            "Explored responsive design techniques"
            "Reviewed SQL query structure"
            "Studied database relationships"
            "Practiced cleaner code organization"
            "Reviewed HTML semantic structure"
            "Improved CSS spacing and layout awareness"
            "Practiced JavaScript logic basics"
            "Reviewed project documentation habits"
            "Studied networking concepts"
            "Practiced troubleshooting workflow"
            "Improved understanding of system design"
            "Reviewed portfolio improvement ideas"
            "Explored accessibility in web design"
            "Practiced writing clearer commit messages"
            "Reviewed form design and user flow"
            "Studied dashboard layout patterns"
            "Improved development consistency"
          )

          RANDOM_INDEX=$((RANDOM % ${#RANDOM_NOTES[@]}))

          echo "" >> README.md
          echo "## $DATE" >> README.md
          echo "" >> README.md
          echo "### Learning Notes" >> README.md
          echo "- ${RANDOM_NOTES[$RANDOM_INDEX]}" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "shemaiahezra-m"
          git config --global user.email "230293707+shemaiahezra-m@users.noreply.github.com"

          git add README.md
          git commit -m "docs: auto update daily log" || echo "No changes"
          git push
